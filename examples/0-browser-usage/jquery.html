<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logger + jQuery 示例</title>
  
  <!-- 1. 早期错误捕获 -->
  <script src="https://unpkg.com/aemeath-js/scripts/early-error.js"></script>
  
  <!-- 2. Logger 核心 -->
  <script src="https://unpkg.com/aemeath-js/dist/browser.global.js"></script>
  
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    .panel { background: #f5f5f5; padding: 15px; margin-top: 20px; border-radius: 8px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    input { padding: 10px; margin: 5px; width: 200px; }
    #log-list { list-style: none; padding: 0; }
    #log-list li { padding: 8px; margin: 4px 0; background: #fff; border-radius: 4px; font-family: monospace; font-size: 12px; }
    .log-info { border-left: 3px solid #2196f3; }
    .log-warn { border-left: 3px solid #ff9800; }
    .log-error { border-left: 3px solid #f44336; }
  </style>
</head>
<body>
  <h1>aemeath-js + jQuery 示例</h1>
  
  <div class="panel">
    <h3>用户操作测试</h3>
    <input type="text" id="username" placeholder="输入用户名">
    <button id="btn-submit">提交</button>
    <button id="btn-fetch">模拟 AJAX</button>
    <button id="btn-error">触发错误</button>
  </div>

  <div class="panel">
    <h3>日志记录</h3>
    <ul id="log-list"></ul>
  </div>

  <!-- 3. jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  <script>
    // 初始化 Logger
    AemeathJs.init({
      level: 'debug',
      upload: function(log) {
        // 显示到页面
        var levelClass = 'log-' + log.level;
        var time = new Date(log.timestamp).toLocaleTimeString();
        var item = $('<li>')
          .addClass(levelClass)
          .text('[' + time + '] [' + log.level.toUpperCase() + '] ' + log.message);
        $('#log-list').prepend(item);
        
        // 实际项目中发送到服务器
        // $.ajax({
        //   url: '/api/logs',
        //   method: 'POST',
        //   contentType: 'application/json',
        //   data: JSON.stringify(log)
        // });
      }
    });
    
    var logger = AemeathJs.getAemeath();
    
    // 页面加载
    $(document).ready(function() {
      logger.info('jQuery 应用已初始化');
      
      // 提交按钮
      $('#btn-submit').click(function() {
        var username = $('#username').val();
        if (username) {
          logger.info('用户提交表单', { username: username });
        } else {
          logger.warn('用户名为空');
        }
      });
      
      // 模拟 AJAX
      $('#btn-fetch').click(function() {
        logger.info('开始 AJAX 请求');
        
        // 模拟 AJAX 请求
        $.ajax({
          url: 'https://jsonplaceholder.typicode.com/posts/1',
          method: 'GET',
          success: function(data) {
            logger.info('AJAX 请求成功', { title: data.title });
          },
          error: function(xhr, status, error) {
            logger.error('AJAX 请求失败', { status: status, error: error });
          }
        });
      });
      
      // 触发错误
      $('#btn-error').click(function() {
        throw new Error('用户触发的测试错误');
      });
      
      // 全局 AJAX 错误捕获
      $(document).ajaxError(function(event, jqxhr, settings, error) {
        logger.error('全局 AJAX 错误', {
          url: settings.url,
          status: jqxhr.status,
          error: error
        });
      });
      
      // 输入框 focus/blur
      $('#username')
        .focus(function() {
          logger.debug('输入框获得焦点');
        })
        .blur(function() {
          logger.debug('输入框失去焦点', { value: $(this).val() });
        });
    });
  </script>
</body>
</html>
