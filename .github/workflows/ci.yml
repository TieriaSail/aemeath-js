name: CI

on:
  push:
    branches: [main, dev, v1.x]
  pull_request:
    branches: [dev, v1.x]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      # Single quality gate identical to `prepublishOnly`:
      # vitest run + tsc src/ + tsc __tests__/ + tsc examples/ + tsup build
      - name: Verify (test + typecheck + build)
        run: npm run verify
